* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Barlow', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.5;
  transition: background 0.25s ease, color 0.25s ease;
}

h1, h2, h3, h4 { font-family: 'Bebas Neue', 'Barlow', sans-serif; letter-spacing: 0.5px; }
code, .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

/* ═══════ LOGIN ═══════ */
#loginScreen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #0F172A 0%, #1E3A8A 60%, #2563EB 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; padding: 20px;
}
.login-card {
  background: var(--card); padding: 40px 32px; border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); width: 100%; max-width: 420px;
  animation: slideUp 0.4s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.logo-biomed {
  text-align: center; margin-bottom: 28px;
}
.login-logo {
  max-width: 240px; width: 100%; height: auto;
  display: block; margin: 0 auto 8px;
  background: #0F172A;
  padding: 16px 24px;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(15, 23, 42, 0.15);
}
.logo-biomed .sub {
  color: var(--gris-500); font-size: 12px; margin-top: 8px;
  text-transform: uppercase; letter-spacing: 3px; font-weight: 700;
}
.login-card h2 { font-size: 28px; color: var(--gris-900); margin-bottom: 6px; font-weight: 400; }
.login-card p.hint { color: var(--gris-500); font-size: 13px; margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 600; color: var(--gris-700);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--gris-200);
  border-radius: var(--radius-sm); font-family: inherit; font-size: 14px;
  transition: all 0.2s; background: var(--card);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--azul-600);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}
.btn {
  padding: 12px 20px; border: none; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px;
  justify-content: center;
}
.btn-primary {
  background: linear-gradient(135deg, var(--azul-700), var(--azul-600));
  color: white; width: 100%; box-shadow: var(--shadow-md);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.btn-secondary { background: var(--gris-100); color: var(--gris-800); }
.btn-secondary:hover { background: var(--gris-200); }
.btn-success { background: var(--verde-600); color: white; }
.btn-danger { background: var(--rojo-600); color: white; }
.btn-danger:hover { background: var(--rojo-700); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.remember {
  display: flex; align-items: center; gap: 8px; margin: 12px 0 20px; font-size: 13px;
  color: var(--gris-600); cursor: pointer;
}
.remember input { width: auto; }
.login-error {
  background: var(--rojo-50); color: var(--rojo-700); padding: 10px 14px;
  border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px;
  display: none; border-left: 3px solid var(--rojo-600);
}

/* ═══════ APP LAYOUT ═══════ */
#app { display: none; min-height: 100vh; }
.topbar {
  background: linear-gradient(135deg, var(--topbar-grad-1), var(--topbar-grad-2));
  color: white; padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow-md); position: sticky; top: 0; z-index: 100;
}
.topbar .brand-small {
  font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 2px;
  display: flex; align-items: center; gap: 10px;
}
.topbar .topbar-logo {
  height: 32px; width: auto; display: block;
  background: rgba(255,255,255,0.08);
  padding: 4px 6px; border-radius: 6px;
}
.topbar .brand-small .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--verde-500); box-shadow: 0 0 12px var(--verde-500);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.topbar .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; }
.topbar .user-info .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px;
}
.topbar button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.topbar button:hover { background: rgba(255,255,255,0.2); }
.topbar .btn-refresh {
  background: rgba(16, 185, 129, 0.15);
  border: 1px solid rgba(16, 185, 129, 0.4);
}
.topbar .btn-refresh:hover {
  background: rgba(16, 185, 129, 0.3);
}
.topbar .btn-refresh.spinning { animation: rotate 0.8s linear infinite; }
@keyframes rotate { to { transform: rotate(360deg); } }

.theme-switcher {
  display: flex; gap: 2px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 3px; border-radius: 10px;
  margin-right: 4px;
}
.theme-switcher .theme-btn {
  background: transparent; border: none;
  width: 30px; height: 28px; padding: 0;
  font-size: 14px; cursor: pointer;
  border-radius: 6px; color: white;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
}
.theme-switcher .theme-btn:hover {
  background: rgba(255,255,255,0.12);
}
.theme-switcher .theme-btn.active {
  background: rgba(255,255,255,0.2);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
}
@media (max-width: 600px) {
  .theme-switcher .theme-btn { width: 26px; height: 24px; font-size: 12px; }
}

.tabs-nav {
  background: var(--card); display: flex; gap: 4px;
  padding: 0 24px; border-bottom: 1px solid var(--border);
  overflow-x: auto; position: sticky; top: 56px; z-index: 90;
  transition: background 0.25s ease;
}
.tab-btn {
  padding: 14px 18px; background: none; border: none; cursor: pointer;
  font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text-muted);
  border-bottom: 3px solid transparent; transition: all 0.2s;
  display: flex; align-items: center; gap: 8px; white-space: nowrap;
}
.tab-btn:hover { color: var(--accent-text); }
.tab-btn.active { color: var(--accent-text); border-bottom-color: var(--accent); }

main { padding: 24px; max-width: 1400px; margin: 0 auto; }
.tab-content { display: none; animation: fadeIn 0.3s ease; }
.tab-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ═══════ DASHBOARD ═══════ */
.kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.kpi-card {
  background: var(--card); border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow); border: 1px solid var(--gris-100);
  position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  background: var(--azul-600);
}
.kpi-card.alert::before { background: var(--rojo-600); }
.kpi-card.success::before { background: var(--verde-600); }
.kpi-card.warn::before { background: var(--amarillo-500); }
.kpi-card .label {
  font-size: 11px; font-weight: 700; color: var(--gris-500);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}
.kpi-card .value {
  font-family: 'Bebas Neue'; font-size: 44px; line-height: 1;
  color: var(--gris-900);
}
.kpi-card .icon { position: absolute; top: 20px; right: 20px; font-size: 32px; opacity: 0.5; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
@media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

.card {
  background: var(--card); border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow); border: 1px solid var(--gris-100);
}
.card-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  padding-bottom: 12px; border-bottom: 1px solid var(--gris-100);
}
.card-header h3 { font-size: 20px; color: var(--gris-900); }
.card-header .actions { display: flex; gap: 8px; }

/* Mini gráfico de barras */
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 140px; padding: 8px 0; }
.bar-col {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0;
}
.bar-col .bar {
  width: 100%; background: linear-gradient(to top, var(--azul-700), var(--azul-500));
  border-radius: 4px 4px 0 0; transition: all 0.3s; min-height: 2px;
  display: flex; align-items: flex-start; justify-content: center; padding-top: 4px;
  color: white; font-size: 10px; font-weight: 700;
}
.bar-col .bar.urgent { background: linear-gradient(to top, var(--rojo-700), var(--rojo-500)); }
.bar-col .bar.warn { background: linear-gradient(to top, var(--naranja-600), var(--amarillo-500)); }
.bar-col .bar-label { font-size: 10px; color: var(--gris-500); font-weight: 600; text-transform: uppercase; }

/* Lista urgencias */
.urg-list { display: flex; flex-direction: column; gap: 8px; }
.urg-item {
  display: flex; align-items: center; gap: 12px; padding: 12px;
  background: var(--gris-50); border-radius: var(--radius-sm);
  border-left: 4px solid var(--gris-300);
  transition: all 0.15s;
}
.urg-item:hover { background: var(--gris-100); }
.urg-item.vencido { border-left-color: var(--gris-800); background: #F3F4F6; }
.urg-item.critico { border-left-color: var(--rojo-700); background: var(--rojo-50); }
.urg-item.urgente { border-left-color: var(--rojo-600); background: var(--rojo-50); }
.urg-item.proximo { border-left-color: var(--naranja-600); background: #FFF7ED; }
.urg-item.atencion { border-left-color: var(--amarillo-500); background: #FEFCE8; }
.urg-item .emoji { font-size: 24px; }
.urg-item .info { flex: 1; min-width: 0; }
.urg-item .info .name { font-weight: 700; color: var(--gris-900); font-size: 14px; }
.urg-item .info .sub { color: var(--gris-600); font-size: 12px; margin-top: 2px; }
.urg-item .dias {
  font-family: 'Bebas Neue'; font-size: 24px; line-height: 1;
  color: var(--gris-700); padding: 4px 12px; background: var(--card); border-radius: 6px;
  min-width: 60px; text-align: center;
}
.urg-item.vencido .dias { color: var(--gris-900); background: var(--card); }
.urg-item.critico .dias, .urg-item.urgente .dias { color: var(--rojo-700); }

/* ═══════ BADGES ═══════ */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.badge.vigente { background: var(--verde-50); color: var(--verde-600); }
.badge.atencion { background: #FEFCE8; color: var(--amarillo-600); }
.badge.proximo { background: #FFF7ED; color: var(--naranja-600); }
.badge.urgente { background: var(--rojo-50); color: var(--rojo-600); }
.badge.critico { background: var(--rojo-50); color: var(--rojo-700); }
.badge.vencido { background: var(--gris-800); color: white; }
.badge.sin-fecha { background: var(--gris-100); color: var(--gris-500); }

/* ═══════ CLIENTES GRID ═══════ */
.toolbar {
  display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
}
.search-input {
  padding: 10px 14px; border: 1.5px solid var(--gris-200); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; flex: 1; min-width: 200px; max-width: 400px;
}
.search-input:focus { outline: none; border-color: var(--azul-600); }

.cliente-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.cliente-card {
  background: var(--card); border-radius: var(--radius); padding: 18px;
  box-shadow: var(--shadow); border: 1px solid var(--gris-100);
  cursor: pointer; transition: all 0.2s;
}
.cliente-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--azul-300); }
.cliente-card .hdr {
  display: flex; gap: 12px; align-items: center; margin-bottom: 12px;
}
.cliente-card .avatar-cli {
  width: 44px; height: 44px; border-radius: 10px;
  background: linear-gradient(135deg, var(--azul-700), var(--verde-600));
  color: white; display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue'; font-size: 20px;
}
.cliente-card .name { font-weight: 700; font-size: 15px; color: var(--gris-900); }
.cliente-card .contacto { font-size: 12px; color: var(--gris-500); }
.cliente-card .stats {
  display: flex; gap: 12px; padding-top: 12px; border-top: 1px solid var(--gris-100);
  font-size: 12px;
}
.cliente-card .stat { flex: 1; }
.cliente-card .stat .num { font-family: 'Bebas Neue'; font-size: 22px; color: var(--azul-700); }
.cliente-card .stat.alert .num { color: var(--rojo-600); }
.cliente-card .stat .lbl { color: var(--gris-500); text-transform: uppercase; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }

/* ═══════ EQUIPOS LISTA ═══════ */
.equipo-card {
  background: var(--card); border-radius: var(--radius); padding: 18px;
  box-shadow: var(--shadow); border: 1px solid var(--gris-100); margin-bottom: 12px;
}
.equipo-card.es-suelto {
  border-style: dashed;
  border-color: var(--naranja-500);
  background: #FFFBEB;
}
.modelo-tag.suelto-tag {
  background: #FEF3C7;
  color: var(--naranja-600);
}
.equipo-card .hdr {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap;
}
.equipo-card .modelo-tag {
  background: var(--azul-50); color: var(--azul-700); padding: 4px 10px;
  border-radius: 6px; font-weight: 700; font-size: 12px;
}
.equipo-card .serie {
  font-family: 'JetBrains Mono'; font-size: 12px; color: var(--gris-600);
  background: var(--gris-50); padding: 3px 8px; border-radius: 4px;
}
.equipo-card .cliente-ref { color: var(--gris-600); font-size: 13px; margin-left: auto; }
.consumibles-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 10px; margin-top: 12px;
}
.consumible-tile {
  padding: 12px; background: var(--gris-50); border-radius: var(--radius-sm);
  border-left: 4px solid var(--gris-300);
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: all 0.15s ease;
  position: relative;
}
.consumible-tile:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
  background: var(--card);
}
.consumible-tile::after {
  content: '›'; position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: 22px; color: var(--gris-400); font-weight: 300;
  opacity: 0; transition: all 0.15s ease;
}
.consumible-tile:hover::after {
  opacity: 1; right: 8px;
}
.consumible-tile:hover .badge {
  filter: brightness(1.05);
  transform: scale(1.05);
}
.consumible-tile .badge { transition: all 0.15s ease; }
.consumible-tile.vigente { border-left-color: var(--verde-500); }
.consumible-tile.atencion { border-left-color: var(--amarillo-500); background: #FEFCE8; }
.consumible-tile.proximo { border-left-color: var(--naranja-500); background: #FFF7ED; }
.consumible-tile.urgente, .consumible-tile.critico { border-left-color: var(--rojo-600); background: var(--rojo-50); }
.consumible-tile.vencido { border-left-color: var(--gris-800); background: #F3F4F6; }
.consumible-tile .emoji { font-size: 22px; }
.consumible-tile .txt { flex: 1; min-width: 0; }
.consumible-tile .name { font-weight: 700; font-size: 13px; }
.consumible-tile .venc { font-size: 11px; color: var(--gris-500); }

/* ═══════ TIPO SELECTOR (Nuevo ítem) ═══════ */
.tipo-selector {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
@media (max-width: 500px) { .tipo-selector { grid-template-columns: 1fr; } }
.tipo-card {
  background: var(--gris-50); border: 2px solid var(--gris-200);
  border-radius: var(--radius); padding: 24px 16px;
  cursor: pointer; transition: all 0.2s; text-align: center;
  font-family: inherit; display: flex; flex-direction: column; gap: 8px;
}
.tipo-card:hover {
  background: var(--azul-50); border-color: var(--azul-600);
  transform: translateY(-2px); box-shadow: var(--shadow-md);
}
.tipo-card .tipo-emoji { font-size: 40px; line-height: 1; }
.tipo-card .tipo-titulo {
  font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 1px;
  color: var(--gris-900);
}
.tipo-card .tipo-desc {
  font-size: 12px; color: var(--gris-600); line-height: 1.4;
}
.stock-table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  background: var(--card); border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow);
}
.stock-table th, .stock-table td {
  padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--gris-100); font-size: 13px;
}
.stock-table thead th {
  background: var(--gris-50); font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.5px; font-weight: 700; color: var(--gris-600);
}
.stock-table tr:last-child td { border-bottom: none; }
.stock-bar {
  height: 8px; background: var(--gris-100); border-radius: 999px; overflow: hidden;
  min-width: 100px; margin-top: 4px;
}
.stock-bar-fill { height: 100%; transition: width 0.3s; border-radius: 999px; }
.stock-bar-fill.ok { background: var(--verde-500); }
.stock-bar-fill.medio { background: var(--amarillo-500); }
.stock-bar-fill.bajo { background: var(--naranja-500); }
.stock-bar-fill.agotado { background: var(--rojo-600); }

/* ═══════ HISTORIAL ═══════ */
.timeline { border-left: 2px solid var(--gris-200); margin-left: 10px; padding-left: 20px; }
.timeline-item {
  position: relative; margin-bottom: 16px; padding-bottom: 12px;
}
.timeline-item::before {
  content: ''; position: absolute; left: -26px; top: 4px;
  width: 12px; height: 12px; border-radius: 50%; background: var(--azul-600); border: 2px solid white;
  box-shadow: 0 0 0 2px var(--azul-200);
}
.timeline-item .meta {
  display: flex; gap: 12px; font-size: 11px; color: var(--gris-500); margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
}
.timeline-item .desc { font-size: 13px; color: var(--gris-800); }

/* ═══════ MODAL ═══════ */
.modal-bg {
  position: fixed; inset: 0; background: rgba(15, 23, 42, 0.55);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
  padding: 20px; animation: fadeIn 0.2s;
}
.modal {
  background: var(--card); border-radius: var(--radius-lg); max-width: 560px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg); animation: slideUp 0.25s;
}
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid var(--gris-100);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h3 { font-size: 22px; }
.modal-body { padding: 20px 24px; }
.modal-footer {
  padding: 16px 24px; background: var(--gris-50); border-top: 1px solid var(--gris-100);
  display: flex; justify-content: flex-end; gap: 8px;
}
.close-btn { background: none; border: none; font-size: 24px; color: var(--gris-400); cursor: pointer; }
.close-btn:hover { color: var(--gris-700); }

/* ═══════ UTILIDADES ═══════ */
.loading {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--gris-900); color: white; padding: 12px 20px;
  border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); z-index: 2000;
  animation: slideUp 0.2s;
}
.toast.success { background: var(--verde-600); }
.toast.error { background: var(--rojo-600); }

/* Loading overlay */
#loadingOverlay {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, 0.55);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 3000;
  animation: fadeIn 0.15s ease;
}
#loadingOverlay .box {
  background: var(--card); padding: 28px 36px; border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); text-align: center;
  min-width: 260px; max-width: 380px;
}
#loadingOverlay .spinner {
  width: 44px; height: 44px; margin: 0 auto 16px;
  border: 4px solid var(--azul-50); border-top-color: var(--azul-600);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
#loadingOverlay .titulo {
  font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 1px;
  color: var(--gris-900); margin-bottom: 4px;
}
#loadingOverlay .mensaje {
  color: var(--gris-600); font-size: 13px; line-height: 1.5;
}
.empty {
  text-align: center; padding: 40px 20px; color: var(--gris-500);
}
.empty .ico { font-size: 48px; opacity: 0.5; margin-bottom: 8px; }

/* Mobile */
@media (max-width: 600px) {
  main { padding: 16px 12px; }
  .topbar { padding: 12px 16px; }
  .topbar .brand-small { font-size: 18px; }
  .kpi-card .value { font-size: 32px; }
  .cliente-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ═════ LOGIN ═════ -->
<div id="loginScreen">
  <div class="login-card">

<!-- ═════ APP ═════ -->
<div id="app">
  <header class="topbar">

      <span>BIOMED MD · CONSUMIBLES</span>

    </div>
    <div class="user-info">
      <div class="theme-switcher">
        <button class="theme-btn" data-theme="claro" onclick="setTheme('claro')" title="Tema claro">☀️</button>
        <button class="theme-btn" data-theme="oscuro" onclick="setTheme('oscuro')" title="Tema oscuro">🌙</button>
        <button class="theme-btn" data-theme="auto" onclick="setTheme('auto')" title="Automático según el sistema">⚙️</button>
        <button class="theme-btn" data-theme="verde" onclick="setTheme('verde')" title="Tema verde">🌿</button>
      </div>
      <button class="btn-refresh" onclick="refrescarManual()" title="Recargar datos">🔄 Actualizar</button>
      <div class="avatar" id="userAvatar">–</div>

  <nav class="tabs-nav">
    <button class="tab-btn active" data-tab="dashboard">📊 Panel</button>
    <button class="tab-btn" data-tab="clientes">🏥 Clientes</button>
    <button class="tab-btn" data-tab="equipos">🫀 Equipos</button>

  <main>

          <h3>📦 Alertas de stock bajo</h3>
        </div>

      </div>

    <!-- CLIENTES -->
    <section class="tab-content" id="tab-clientes">
      <div class="toolbar">

    <!-- HISTORIAL -->
    <section class="tab-content" id="tab-historial">
      <div class="card">

</div>

<div id="modalContainer"></div>
<div id="toastContainer"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG Y ESTADO GLOBAL
// ═══════════════════════════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzA80vWb85nJM2U0QMmXdgRZNllCEC3Ppz25wneH4F1IrRIsfXwXe0gUnIPbxCoOGDgdw/exec';

const state = {
  usuario: null,
  dashboard: null,
  clientes: [],
  equipos: [],
  sueltos: [],
  stock: [],
  catalogo: {},
  modelos: []
};

// ═══════════════════════════════════════════════════════════════════════════
// TEMAS (Claro / Oscuro / Auto / Verde)
// ═══════════════════════════════════════════════════════════════════════════
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('biomed_theme', theme);
  // Actualizar botones activos
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === theme);
  });
  // Actualizar meta theme-color para la barra del navegador (PWA)
  const metaColor = document.querySelector('meta[name="theme-color"]');
  if (metaColor) {
    const colors = { claro: '#0F172A', oscuro: '#0A0F1C', verde: '#064E3B', auto: '#0F172A' };
    metaColor.setAttribute('content', colors[theme] || '#0F172A');
  }
}

// Cargar tema guardado al iniciar (se ejecuta antes del login)
(function initTheme() {
  const saved = localStorage.getItem('biomed_theme') || 'claro';
  document.documentElement.setAttribute('data-theme', saved);
  // Marcar el botón activo una vez que el DOM esté listo
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.theme === saved);
    });
  });
})();

// ═══════════════════════════════════════════════════════════════════════════
// ICONOS SVG DE CONSUMIBLES (profesionales, sin emojis)
// ═══════════════════════════════════════════════════════════════════════════
function iconConsumible(tipo, size) {
  size = size || 28;
  const s = size;
  const svgBase = `width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"`;

  if (tipo === 'bateria') {
    return `<svg ${svgBase}>
      <rect x="3" y="8" width="15" height="10" rx="1.5"/>
      <path d="M21 11v4"/>
      <line x1="7" y1="13" x2="7" y2="13.01"/>
      <line x1="10.5" y1="13" x2="10.5" y2="13.01"/>
      <line x1="14" y1="13" x2="14" y2="13.01"/>
    </svg>`;
  }

  if (tipo === 'electrodo-pediatrico') {
    // Electrodo con silueta pequeña + símbolo niño
    return `<svg ${svgBase}>
      <rect x="3" y="6" width="18" height="14" rx="2"/>
      <circle cx="12" cy="11" r="1.5"/>
      <path d="M9.5 14.5 Q12 17 14.5 14.5"/>
      <path d="M2 4 L4 6 M20 6 L22 4"/>
    </svg>`;
  }

  // Default: electrodo adulto (rectángulo con forma de pad + símbolo rayo pequeño adentro)
  return `<svg ${svgBase}>
    <rect x="3" y="4" width="18" height="16" rx="2.5"/>
    <path d="M11 8 L9 13 L12 13 L10 17 L14 11 L11 11 L13 8 Z" fill="currentColor" stroke="none"/>
  </svg>`;
}

function badgeConsumible(c) {
  if (c.diasRestantes === null || c.diasRestantes === undefined) return '-';
  if (c.diasRestantes < 0) return 'VENC';
  return c.diasRestantes + 'd';
}
async function api(action, params = {}) {
  const formData = new FormData();
  formData.append('payload', JSON.stringify({ action, params }));
  try {
    const res = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
    const data = await res.json();
    return data;
  } catch (e) {
    console.error('API error', e);
    toast('Error de conexión', 'error');
    return { ok: false, error: e.message };
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════════════════════
async function cargarUsuarios() {
  const sel = document.getElementById('loginUsuario');
  const r = await api('listarUsuariosActivos', {});
  if (!r.ok || !r.data.length) {
    sel.innerHTML = '<option value="">(Sin usuarios cargados)</option>';
    return;
  }
  sel.innerHTML = '<option value="">Seleccioná tu usuario...</option>' +
    r.data.map(u => `<option value="${u.usuario}">${u.nombre}</option>`).join('');

  // Pre-seleccionar si hay uno guardado
  const saved = localStorage.getItem('biomed_last_user');
  if (saved && r.data.find(u => u.usuario === saved)) {
    sel.value = saved;
    document.getElementById('loginPin').focus();
  }
}

async function doLogin() {
  const usuario = document.getElementById('loginUsuario').value.trim();
  const pin = document.getElementById('loginPin').value.trim();
  if (!usuario || !pin) { showLoginError('Seleccioná usuario e ingresá PIN'); return; }

  setLoadingLogin(true);
  const res = await api('login', { usuario, pin });
  setLoadingLogin(false);

  if (!res.ok) { showLoginError(res.error || 'Credenciales inválidas'); return; }

  state.usuario = res.usuario;
  localStorage.setItem('biomed_last_user', res.usuario.usuario); // recordar solo el nombre, no el PIN
  if (document.getElementById('remember').checked) {
    localStorage.setItem('biomed_user', JSON.stringify(res.usuario));
  }
  entrarApp();
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}
function setLoadingLogin(on) {
  document.getElementById('btnLogin').disabled = on;
  document.getElementById('loginBtnText').innerHTML = on ? '<span class="loading"></span> Ingresando...' : 'Ingresar →';
}

async function entrarApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const u = state.usuario;
  document.getElementById('userName').textContent = u.nombre;
  document.getElementById('userRol').textContent = u.rol === 'super_admin' ? 'Super Admin' : 'Admin';
  document.getElementById('userAvatar').textContent = (u.nombre || u.usuario).substring(0, 2).toUpperCase();
  await cargarDataInicial();
  hideLoading();
}

function logout() {
  localStorage.removeItem('biomed_user');
  location.reload();
}

// ═══════════════════════════════════════════════════════════════════════════
// CARGA INICIAL
// ═══════════════════════════════════════════════════════════════════════════
async function cargarDataInicial() {
  const r = await api('getInitData', {});
  if (!r.ok) { toast('Error cargando datos', 'error'); return; }
  state.dashboard = r.dashboard;
  state.clientes = r.clientes;
  state.equipos = r.equipos;
  state.sueltos = r.sueltos || [];
  state.stock = r.stock;
  state.catalogo = r.catalogo;
  state.modelos = r.modelos;

  renderDashboard();
  renderClientes();
  renderEquipos();
  renderStock();
  populateFilterCliente();

  // Historial se carga on-demand
}

// ═══════════════════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════════════════
document.addEventListener('click', (e) => {
  if (e.target.matches('.tab-btn')) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    const tab = e.target.dataset.tab;
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'historial') cargarHistorial();
    if (tab === 'stock') cargarMovimientos();
  }
});

// ═══════════════════════════════════════════════════════════════════════════
// DASHBOARD RENDER
// ═══════════════════════════════════════════════════════════════════════════
function renderDashboard() {
  const d = state.dashboard;
  const grid = document.getElementById('kpiGrid');
  grid.innerHTML = `
    <div class="kpi-card">
      <div class="icon">🏥</div>
      <div class="label">Clientes</div>
      <div class="value">${d.kpis.clientes}</div>
    </div>
    <div class="kpi-card success">
      <div class="icon">🫀</div>
      <div class="label">Equipos activos</div>
      <div class="value">${d.kpis.equipos}</div>
    </div>
    <div class="kpi-card success">
      <div class="icon">✅</div>
      <div class="label">Consumibles vigentes</div>
      <div class="value">${d.estados.vigente || 0}</div>
    </div>
    <div class="kpi-card alert">
      <div class="icon">🚨</div>
      <div class="label">Alertas pendientes</div>
      <div class="value">${d.kpis.alertasPendientes}</div>
    </div>
  `;

  // Bar chart 12 meses
  const bar = document.getElementById('barChart');
  const max = Math.max(1, ...d.prox12.map(x => x.count));
  bar.innerHTML = d.prox12.map(m => {
    const h = (m.count / max) * 100;
    const cls = m.count === 0 ? '' : (m.count > max * 0.66 ? 'urgent' : m.count > max * 0.33 ? 'warn' : '');
    return `
      <div class="bar-col">
        <div class="bar ${cls}" style="height:${Math.max(h, 2)}%">${m.count || ''}</div>
        <div class="bar-label">${m.label}</div>
      </div>
    `;
  }).join('');

  // Top urgencias
  const ul = document.getElementById('urgList');
  if (!d.topUrgencias.length) {
    ul.innerHTML = '<div class="empty"><div class="ico">✨</div>Sin urgencias</div>';
  } else {
    ul.innerHTML = d.topUrgencias.map(u => `
      <div class="urg-item ${u.estado}">
        <div class="emoji">${iconConsumible(u.tipoIcono, 24)}</div>
        <div class="info">
          <div class="name">${u.nombreCorto} · ${u.cliente}</div>
          <div class="sub">${u.equipoModelo || ''} · S/N ${u.numeroSerie || '-'}</div>
        </div>
        <div class="dias">${u.diasRestantes < 0 ? 'VENC' : u.diasRestantes + 'd'}</div>
      </div>
    `).join('');
  }

  // Stock bajo
  const sa = document.getElementById('stockAlerts');
  if (!d.stockBajo.length) {
    sa.innerHTML = '<div class="empty"><div class="ico">👍</div>Stock OK en todos los items</div>';
  } else {
    sa.innerHTML = d.stockBajo.map(s => `
      <div class="urg-item ${s.estadoStock === 'agotado' ? 'urgente' : 'proximo'}">
        <div class="emoji">${iconConsumible(s.tipoIcono, 24)}</div>
        <div class="info">
          <div class="name">${s.nombreCorto} · ${s.CodigoZOLL}</div>
          <div class="sub">Stock: ${s.StockActual} / Mínimo: ${s.StockMinimo}</div>
        </div>
        <div class="dias">${s.StockActual}</div>
      </div>
    `).join('');
  }
}

function populateFilterCliente() {
  const sel = document.getElementById('filterCliente');
  sel.innerHTML = '<option value="">Todos los clientes</option>' +

function verCliente(id) {

// EQUIPOS
// ═══════════════════════════════════════════════════════════════════════════
function renderEquipos() {
  const q = (document.getElementById('searchEquipos')?.value || '').toLowerCase();
  const filtroCli = document.getElementById('filterCliente')?.value || '';

  // Combinar equipos reales + pseudo-equipos de consumibles sueltos
  const todos = [...state.equipos, ...state.sueltos];

  const data = todos.filter(e => {
    if (filtroCli && e.ClienteID !== filtroCli) return false;
    if (q && !((e.Modelo || '') + (e.NumeroSerie || '') + (e.cliente || '') + (e.UbicacionSitio || '')).toLowerCase().includes(q)) return false;
    return true;
  });
  const cont = document.getElementById('equiposList');
  if (!data.length) {
    cont.innerHTML = '<div class="empty"><div class="ico">🫀</div>Sin equipos ni consumibles sueltos. Creá el primer ítem!</div>';
    return;
  }
  cont.innerHTML = data.map(e => {
    const esSuelto = e.esSuelto === true;
    return `
    <div class="equipo-card ${esSuelto ? 'es-suelto' : ''}">
      <div class="hdr">
        <span class="modelo-tag ${esSuelto ? 'suelto-tag' : ''}">${e.Modelo}</span>
        ${!esSuelto ? `<span class="serie">S/N: ${e.NumeroSerie || '-'}</span>` : ''}
        ${e.UbicacionSitio ? '<span style="font-size:12px; color:var(--gris-600);">📍 ' + e.UbicacionSitio + '</span>' : ''}
        <span class="cliente-ref">🏥 ${e.cliente}</span>
        ${!esSuelto ? `<button class="btn btn-sm btn-secondary" onclick="openModalConsumible('${e.ID}', '${e.ClienteID}')">➕ Consumible</button>` : `<button class="btn btn-sm btn-secondary" onclick="openModalConsumibleSuelto('${e.ClienteID}')">➕ Otro suelto</button>`}
        ${!esSuelto ? `<button class="btn btn-sm btn-secondary" onclick="editarEquipo('${e.ID}')">✏️</button>` : ''}
      </div>
      <div class="consumibles-grid">
        ${(e.consumibles || []).length === 0 ?
          '<div style="padding:16px; color: var(--gris-500); font-size:13px; font-style:italic;">Sin consumibles cargados</div>' :
          e.consumibles.map(c => `
            <div class="consumible-tile ${c.estado}" onclick="verConsumible('${c.ID}', '${e.ID}')">
              <div class="emoji">${iconConsumible(c.tipoIcono)}</div>
              <div class="txt">
                <div class="name">${c.nombreCorto || c.CodigoZOLL}</div>
                <div class="venc">${c.FechaVencimiento ? 'Vencimiento: ' + formatFecha(c.FechaVencimiento) : 'Sin fecha'}</div>
              </div>
              <span class="badge ${c.estado}">${c.diasRestantes !== null ? (c.diasRestantes < 0 ? 'VENC' : c.diasRestantes + 'd') : '-'}</span>
            </div>
          `).join('')
        }
      </div>
    </div>
    `;
  }).join('');
}
document.addEventListener('input', e => { if (e.target.id === 'searchEquipos') renderEquipos(); });
document.addEventListener('change', e => { if (e.target.id === 'filterCliente') renderEquipos(); });

async function guardarCliente(id) {
  const params = {
    id,
    razonSocial: document.getElementById('m_razon').value.trim(),
    nombreContacto: document.getElementById('m_contacto').value.trim(),
    email: document.getElementById('m_email').value.trim(),
    telefono: document.getElementById('m_tel').value.trim(),
    direccion: document.getElementById('m_dir').value.trim(),
    ciudad: document.getElementById('m_ciudad').value.trim(),
    provincia: document.getElementById('m_prov').value.trim(),
    notas: document.getElementById('m_notas').value.trim(),
    adminEmail: state.usuario.usuario
  };
  if (!params.razonSocial) { toast('Razón Social requerida', 'error'); return; }
  showLoading(id ? 'Actualizando cliente' : 'Creando cliente', 'Guardando en la base de datos...');
  const r = await api(id ? 'editarCliente' : 'crearCliente', params);
  if (r.ok) {
    closeModal();
    await refrescar();
    hideLoading();
    toast(id ? '✅ Cliente actualizado' : '✅ Cliente creado', 'success');
  } else {
    hideLoading();
    toast(r.error || 'Error', 'error');
  }
}

function cerrarYAbrir(tipo, clienteID) {
  closeModal();

      openModalConsumibleSuelto(clienteID || '');

  }, 50);
}

// ═══════════════════════════════════════════════════════════════════════════
// MODAL CONSUMIBLE - UNIFICADO
// Soporta: equipoID ya conocido, clienteID ya conocido, o ambos vacíos (elige desde 0)
// ═══════════════════════════════════════════════════════════════════════════
function openModalConsumible(equipoID, clienteID) {
  abrirModalConsumible({
    equipoID: equipoID || '',
    clienteID: clienteID || '',
    permitirCambiarCliente: false
  });
}

function openModalConsumibleSuelto(clienteID) {
  abrirModalConsumible({
    equipoID: '',
    clienteID: clienteID || '',
    permitirCambiarCliente: !clienteID
  });
}

function abrirModalConsumible(opts) {
  const { equipoID, clienteID, permitirCambiarCliente } = opts;

  const catalogoOpts = Object.keys(state.catalogo).map(cod => {
    const c = state.catalogo[cod];
    return `<option value="${cod}">${c.nombre} (${cod})</option>`;
  }).join('');

  const clientesOpts = '<option value="">-- Seleccionar cliente --</option>' +
    state.clientes.map(c => `<option value="${c.ID}" ${c.ID === clienteID ? 'selected' : ''}>${c.RazonSocial}</option>`).join('');

  // Si vino con equipoID, mostrarlo pero readonly
  let selectorClienteHTML = '';
  let selectorEquipoHTML = '';

  if (equipoID) {
    const eq = state.equipos.find(x => x.ID === equipoID);
    selectorClienteHTML = `
      <div class="form-group">
        <label>Cliente</label>
        <input value="${eq ? eq.cliente : ''}" disabled style="background:var(--gris-50); color:var(--gris-600);">
        <input type="hidden" id="m_cliente_c" value="${eq ? eq.ClienteID : clienteID}">
      </div>
    `;
    selectorEquipoHTML = `
      <div class="form-group">
        <label>Equipo</label>
        <input value="${eq ? eq.Modelo + ' · S/N ' + (eq.NumeroSerie || '-') : ''}" disabled style="background:var(--gris-50); color:var(--gris-600);">
        <input type="hidden" id="m_equipo_c" value="${equipoID}">
      </div>
    `;
  } else if (clienteID && !permitirCambiarCliente) {
    // Cliente pre-seleccionado (venís del click en una tarjeta de cliente)
    const cli = state.clientes.find(c => c.ID === clienteID);
    selectorClienteHTML = `
      <div class="form-group">
        <label>Cliente</label>
        <input value="${cli ? cli.RazonSocial : ''}" disabled style="background:var(--azul-50); color:var(--azul-700); font-weight:600;">
        <input type="hidden" id="m_cliente_c" value="${clienteID}">
      </div>
    `;
    selectorEquipoHTML = `
      <div class="form-group">
        <label>Equipo (opcional)</label>
        <select id="m_equipo_c">
          <option value="">📦 Sin equipo (suelto / stock del cliente)</option>
          ${state.equipos.filter(e => e.ClienteID === clienteID).map(e =>
            `<option value="${e.ID}">${e.Modelo} · S/N ${e.NumeroSerie || '-'}</option>`
          ).join('')}
        </select>
        <small style="color:var(--gris-500); font-size:12px;">Si no asociás a un equipo, queda como consumible suelto del cliente.</small>
      </div>
    `;
  } else {
    selectorClienteHTML = `
      <div class="form-group">
        <label>Cliente *</label>
        <select id="m_cliente_c" onchange="actualizarEquiposDeCliente()">
          ${clientesOpts}
        </select>
      </div>
    `;
    selectorEquipoHTML = `
      <div class="form-group">
        <label>Equipo (opcional)</label>
        <select id="m_equipo_c">
          <option value="">📦 Sin equipo (suelto / stock del cliente)</option>
        </select>
        <small style="color:var(--gris-500); font-size:12px;">Si no asociás a un equipo, queda como consumible suelto del cliente.</small>
      </div>
    `;
  }

  showModal(`
    <div class="modal-header">
      <h3>➕ Nuevo consumible</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      ${selectorClienteHTML}
      ${selectorEquipoHTML}
      <div class="form-group"><label>Producto *</label>
        <select id="m_codigo" onchange="previewVencimiento()">${catalogoOpts}</select>
      </div>
      <div class="form-group"><label>Lote / Serie</label><input id="m_lote"></div>
      <div class="form-group"><label>Fecha de instalación / venta</label>
        <input id="m_finst_c" type="date" value="${new Date().toISOString().substring(0,10)}" onchange="previewVencimiento()">
      </div>
      <div class="form-group"><label>Fecha de vencimiento (override manual opcional)</label>
        <input id="m_fvenc" type="date">
        <small id="m_preview" style="color:var(--gris-500); font-size:12px; display:block; margin-top:4px;"></small>
      </div>
      <label class="remember" style="opacity: 0.55;">
        <input type="checkbox" id="m_descontar" disabled>
        <span>📦 Descontar del stock BIOMED <small style="color: var(--gris-500); font-weight: 400;">(deshabilitado · sin base de stock cargada)</small></span>
      </label>
      <div class="form-group"><label>Notas</label><textarea id="m_notas_con" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarConsumible()">💾 Guardar</button>
    </div>
  `);
  previewVencimiento();
  if (!equipoID && clienteID) actualizarEquiposDeCliente();
}

function actualizarEquiposDeCliente() {
  const cli = document.getElementById('m_cliente_c').value;
  const sel = document.getElementById('m_equipo_c');
  if (!sel) return;
  const eqs = state.equipos.filter(e => e.ClienteID === cli);
  sel.innerHTML = '<option value="">📦 Sin equipo (suelto / stock del cliente)</option>' +
    eqs.map(e => `<option value="${e.ID}">${e.Modelo} · S/N ${e.NumeroSerie || '-'}</option>`).join('');
}

function previewVencimiento() {
  const cod = document.getElementById('m_codigo').value;
  const finst = document.getElementById('m_finst_c').value;
  const cat = state.catalogo[cod];
  if (!cat || !finst) return;
  const d = new Date(finst);
  d.setMonth(d.getMonth() + cat.vidaUtilMeses);
  document.getElementById('m_preview').textContent = `Vence el ${d.toLocaleDateString('es-AR')} (${cat.vidaUtilMeses / 12} años desde instalación)`;
}

async function guardarConsumible() {
  const clienteID = document.getElementById('m_cliente_c').value;
  const equipoID = document.getElementById('m_equipo_c').value;
  const codigoZOLL = document.getElementById('m_codigo').value;
  const fechaInst = document.getElementById('m_finst_c').value;

  // Validaciones estrictas
  if (!clienteID) { toast('⚠️ Seleccioná un cliente', 'error'); return; }
  if (!codigoZOLL) { toast('⚠️ Seleccioná un producto', 'error'); return; }
  if (!fechaInst) { toast('⚠️ Ingresá fecha de instalación', 'error'); return; }

  // Mostrar loader en el botón
  const btn = event.target;
  const txtOriginal = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> Guardando...';

  showLoading('Cargando consumible', 'Calculando vencimiento y guardando...');

  const params = {
    clienteID,
    equipoID,
    codigoZOLL,
    lote: document.getElementById('m_lote').value.trim(),
    fechaInstalacion: fechaInst,
    fechaVencimiento: document.getElementById('m_fvenc').value || null,
    notas: document.getElementById('m_notas_con').value.trim(),
    descontarStock: document.getElementById('m_descontar').checked,
    adminEmail: state.usuario.usuario
  };

  const r = await api('crearConsumible', params);

  btn.disabled = false;
  btn.innerHTML = txtOriginal;

  if (!r.ok) {
    hideLoading();
    toast('❌ ' + (r.error || 'Error al guardar'), 'error');
    return;
  }

  // Calcular fecha de vencimiento para mostrar en el popup de confirmación
  const cat = state.catalogo[codigoZOLL];
  const cliente = state.clientes.find(c => c.ID === clienteID);
  const equipo = equipoID ? state.equipos.find(e => e.ID === equipoID) : null;

  let fechaVenc;
  if (params.fechaVencimiento) {
    fechaVenc = new Date(params.fechaVencimiento);
  } else {
    fechaVenc = new Date(fechaInst);
    fechaVenc.setMonth(fechaVenc.getMonth() + cat.vidaUtilMeses);
  }

  closeModal();

  // Popup de confirmación con los detalles
  showModal(`
    <div class="modal-header">
      <h3 style="color: var(--verde-600);">✅ Consumible cargado</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="background: var(--verde-50); padding: 16px; border-radius: var(--radius-sm); border-left: 4px solid var(--verde-500); margin-bottom: 16px;">
        <div style="color: var(--verde-600); margin-bottom: 8px;">${iconConsumible(cat.tipoIcono, 36)}</div>
        <div style="font-weight: 700; color: var(--gris-900); font-size: 15px;">${cat.nombre}</div>
        <div style="font-size: 12px; color: var(--gris-600); margin-top: 2px;"><code class="mono">${codigoZOLL}</code>${params.lote ? ' · Lote: ' + params.lote : ''}</div>
      </div>

      <div style="display: grid; gap: 8px; font-size: 13px;">
        <div><strong>🏥 Cliente:</strong> ${cliente ? cliente.RazonSocial : '-'}</div>
        <div><strong>🫀 Equipo:</strong> ${equipo ? equipo.Modelo + ' · S/N ' + (equipo.NumeroSerie || '-') : '<em style="color: var(--naranja-600);">Suelto (sin equipo)</em>'}</div>
        <div><strong>📅 Instalación:</strong> ${new Date(fechaInst).toLocaleDateString('es-AR')}</div>
        <div><strong>⏰ Vencimiento:</strong> <span style="color: var(--azul-700); font-weight: 700;">${fechaVenc.toLocaleDateString('es-AR')}</span> <small style="color: var(--gris-500);">(${cat.vidaUtilMeses / 12} años de vida útil)</small></div>
        ${params.descontarStock ? '<div style="color: var(--verde-600);"><strong>📦 Stock:</strong> Se descontó 1 unidad de ' + codigoZOLL + '</div>' : ''}
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
      ${equipoID ?
        `<button class="btn btn-primary" onclick="closeModal(); openModalConsumible('${equipoID}', '${clienteID}');">➕ Cargar otro al mismo equipo</button>` :
        `<button class="btn btn-primary" onclick="closeModal(); openModalConsumibleSuelto('${clienteID}');">➕ Cargar otro al mismo cliente</button>`
      }
    </div>
  `);

  hideLoading();
  await refrescar();
}

function verConsumible(id, equipoOSueltoID) {
  // Buscar tanto en equipos reales como en sueltos
  const fuente = [...state.equipos, ...state.sueltos].find(e => e.ID === equipoOSueltoID);
  const c = (fuente?.consumibles || []).find(x => x.ID === id);
  if (!c) return;

  const cat = state.catalogo[c.CodigoZOLL] || {};

  // Buscar info del cliente para habilitar/deshabilitar botones de aviso
  const clienteID = c.ClienteID || fuente?.ClienteID;
  const cliente = state.clientes.find(x => x.ID === clienteID);
  const tieneEmail = cliente && cliente.Email;
  const tieneTel = cliente && cliente.Telefono;

  const clienteInfoHTML = cliente ? `
    <div style="background: var(--gris-50); padding: 12px; border-radius: var(--radius-sm); margin: 12px 0; border-left: 4px solid var(--azul-600);">
      <div style="font-size: 11px; color: var(--gris-500); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;">Cliente</div>
      <div style="font-weight: 700; color: var(--gris-900); margin-top: 2px;">🏥 ${cliente.RazonSocial}</div>
      ${cliente.NombreContacto ? `<div style="font-size: 13px; color: var(--gris-600);">${cliente.NombreContacto}</div>` : ''}
      <div style="font-size: 12px; color: var(--gris-600); margin-top: 4px;">
        ${tieneEmail ? '📧 ' + cliente.Email + ' ' : '<span style="color: var(--gris-400);">📧 (sin email)</span> '}
        ${tieneTel ? '· 📱 ' + cliente.Telefono : '<span style="color: var(--gris-400);">· 📱 (sin teléfono)</span>'}
      </div>
    </div>
  ` : '';

  showModal(`
    <div class="modal-header">
      <h3 style="display:flex; align-items:center; gap:10px;"><span style="color: var(--azul-700);">${iconConsumible(cat.tipoIcono, 28)}</span>${cat.nombre || c.CodigoZOLL}</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <p><strong>Estado:</strong> <span class="badge ${c.estado}">${c.badge}</span></p>
      <p><strong>Código:</strong> <code class="mono">${c.CodigoZOLL}</code></p>
      <p><strong>Lote:</strong> ${c.Lote || '-'}</p>
      <p><strong>Instalación:</strong> ${formatFecha(c.FechaInstalacion)}</p>
      <p><strong>Vencimiento:</strong> ${formatFecha(c.FechaVencimiento)}</p>
      <p><strong>Días restantes:</strong> ${c.diasRestantes !== null ? c.diasRestantes : '-'}</p>
      ${c.Notas ? '<p><strong>Notas:</strong> ' + c.Notas + '</p>' : ''}

      ${clienteInfoHTML}

      <div style="margin-top: 16px;">
        <div style="font-size: 12px; font-weight: 700; color: var(--gris-600); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">
          📢 Avisar al cliente (opcional)
        </div>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
          <button class="btn btn-sm ${tieneEmail ? 'btn-primary' : 'btn-secondary'}"
                  onclick="avisarCliente('${c.ID}', 'email')"
                  ${!tieneEmail ? 'disabled title="El cliente no tiene email cargado"' : ''}>
            📧 Enviar email
          </button>
          <button class="btn btn-sm ${tieneTel ? 'btn-success' : 'btn-secondary'}"
                  onclick="avisarCliente('${c.ID}', 'whatsapp')"
                  ${!tieneTel ? 'disabled title="El cliente no tiene teléfono cargado"' : ''}>
            💬 WhatsApp
          </button>
        </div>
        <small style="color: var(--gris-500); font-size: 11px; display: block; margin-top: 6px;">
          Los avisos se envían manualmente. No son automáticos.
        </small>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-success" onclick="iniciarReemplazo('${c.ID}', '${equipoOSueltoID}', '${c.CodigoZOLL}')">🔄 Reemplazar</button>
    </div>
  `);
}

async function avisarCliente(consumibleID, canal) {
  const btn = event.target;
  const txtOriginal = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> Enviando...';

  const r = await api('enviarAlertaClienteManual', {
    consumibleID,
    canal,
    adminEmail: state.usuario.usuario
  });

  btn.disabled = false;
  btn.innerHTML = txtOriginal;

  if (!r.ok) {
    toast(r.error || 'Error enviando aviso', 'error');
    return;
  }

  if (canal === 'email') {
    toast(`✅ Email enviado a ${r.destino}`, 'success');
  } else if (canal === 'whatsapp') {
    toast('💬 Abriendo WhatsApp...', 'success');
    // Abrir link de WhatsApp en nueva pestaña
    if (r.url) window.open(r.url, '_blank');
  }
}

function iniciarReemplazo(idViejo, equipoID, codigoActual) {
  const catalogoOpts = Object.keys(state.catalogo).map(cod => {
    const ca = state.catalogo[cod];
    return `<option value="${cod}" ${cod === codigoActual ? 'selected' : ''}>${ca.emoji} ${ca.nombre}</option>`;
  }).join('');
  showModal(`
    <div class="modal-header">
      <h3>🔄 Reemplazar consumible</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--gris-600); margin-bottom:12px;">Se marcará el consumible actual como reemplazado y se creará uno nuevo.</p>
      <div class="form-group"><label>Nuevo producto</label><select id="r_codigo">${catalogoOpts}</select></div>
      <div class="form-group"><label>Lote nuevo</label><input id="r_lote"></div>
      <div class="form-group"><label>Fecha de instalación</label>
        <input id="r_finst" type="date" value="${new Date().toISOString().substring(0,10)}">
      </div>
      <label class="remember" style="opacity: 0.55;">
        <input type="checkbox" id="r_descontar" disabled>
        <span>📦 Descontar del stock BIOMED <small style="color: var(--gris-500); font-weight: 400;">(deshabilitado)</small></span>
      </label>
      <div class="form-group"><label>Notas</label><textarea id="r_notas" rows="2" placeholder="Motivo del reemplazo"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-success" onclick="confirmarReemplazo('${idViejo}')">✅ Confirmar reemplazo</button>
    </div>
  `);
}

async function confirmarReemplazo(idViejo) {
  const params = {
    idViejo,
    codigoZOLL: document.getElementById('r_codigo').value,
    lote: document.getElementById('r_lote').value.trim(),
    fechaInstalacion: document.getElementById('r_finst').value,
    notas: document.getElementById('r_notas').value.trim(),
    descontarStock: document.getElementById('r_descontar').checked,
    adminEmail: state.usuario.usuario
  };
  const r = await api('reemplazarConsumible', params);
  if (r.ok) { toast('✅ Reemplazo registrado', 'success'); closeModal(); await refrescar(); }
  else toast(r.error || 'Error', 'error');
}

function openModalMovimiento(tipo) {
  const opts = state.stock.map(s => `<option value="${s.CodigoZOLL}">${s.emoji} ${s.nombreCorto} (${s.CodigoZOLL}) · actual: ${s.StockActual}</option>`).join('');
  showModal(`
    <div class="modal-header">
      <h3>${tipo === 'ingreso' ? '⬆️ Ingreso' : '⬇️ Egreso'} de stock</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Producto</label><select id="mv_cod">${opts}</select></div>
      <div class="form-group"><label>Cantidad *</label><input id="mv_cant" type="number" min="1" value="1"></div>
      <div class="form-group"><label>Notas</label><textarea id="mv_notas" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn ${tipo === 'ingreso' ? 'btn-success' : 'btn-primary'}" onclick="guardarMovimiento('${tipo}')">💾 Confirmar</button>
    </div>
  `);
}

async function guardarMovimiento(tipo) {
  const params = {
    tipo,
    codigoZOLL: document.getElementById('mv_cod').value,
    cantidad: document.getElementById('mv_cant').value,
    notas: document.getElementById('mv_notas').value.trim(),
    adminEmail: state.usuario.usuario
  };
  if (!params.cantidad || params.cantidad < 1) { toast('Cantidad inválida', 'error'); return; }
  const r = await api('movimientoStock', params);
  if (r.ok) { toast('✅ Movimiento registrado', 'success'); closeModal(); await refrescar(); cargarMovimientos(); }
  else toast(r.error || 'Error', 'error');
}

async function editarMinimo(codigoZOLL, actual) {
  const nuevo = prompt('Nuevo stock mínimo para ' + codigoZOLL, actual);
  if (nuevo === null) return;
  const n = parseInt(nuevo);
  if (isNaN(n) || n < 0) { toast('Valor inválido', 'error'); return; }
  const r = await api('editarStockMinimo', { codigoZOLL, stockMinimo: n });
  if (r.ok) { toast('✅ Actualizado', 'success'); await refrescar(); }
}

// ═══════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════
async function refrescar() {
  const r = await api('getInitData', {});
  if (!r.ok) return;
  state.dashboard = r.dashboard;
  state.clientes = r.clientes;
  state.equipos = r.equipos;
  state.sueltos = r.sueltos || [];
  state.stock = r.stock;
  renderDashboard();
  renderClientes();
  renderEquipos();
  renderStock();
  populateFilterCliente();
}

async function refrescarManual() {
  const btn = document.querySelector('.btn-refresh');
  if (btn) btn.classList.add('spinning');
  showLoading('Actualizando', 'Recargando datos del sistema...');
  await refrescar();
  hideLoading();
  if (btn) btn.classList.remove('spinning');
  toast('✅ Datos actualizados', 'success');
}

function showModal(html) {
  document.getElementById('modalContainer').innerHTML = `<div class="modal-bg" onclick="if(event.target===this) closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

function showLoading(titulo, mensaje) {
  let el = document.getElementById('loadingOverlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loadingOverlay';
    document.body.appendChild(el);
  }
  el.innerHTML = `
    <div class="box">
      <div class="spinner"></div>
      <div class="titulo">${titulo || 'Procesando...'}</div>
      <div class="mensaje">${mensaje || 'Un momento por favor'}</div>
    </div>
  `;
  el.style.display = 'flex';
}
function hideLoading() {
  const el = document.getElementById('loadingOverlay');
  if (el) el.remove();
}

function toast(msg, type = '') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function formatFecha(v) {
  if (!v) return '-';
  try {
    return new Date(v).toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  } catch { return String(v); }
}
function formatFechaHora(v) {
  if (!v) return '-';
  try {
    const d = new Date(v);
    return d.toLocaleDateString('es-AR') + ' ' + d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  } catch { return String(v); }
}
function formatFechaISO(v) {
  if (!v) return '';
  try { return new Date(v).toISOString().substring(0,10); } catch { return ''; }
}

// AUTO-LOGIN
// ═══════════════════════════════════════════════════════════════════════════
(function init() {
  cargarUsuarios();

  const saved = localStorage.getItem('biomed_user');
  if (saved) {
    try {
      state.usuario = JSON.parse(saved);
      if (state.usuario && state.usuario.usuario) {
        entrarApp();
      } else {
        localStorage.removeItem('biomed_user');
      }
    } catch { localStorage.removeItem('biomed_user'); }
  }
  document.getElementById('loginPin').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('loginUsuario').addEventListener('change', () => {
    document.getElementById('loginPin').focus();
  });
})();
</script>
